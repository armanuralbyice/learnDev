<div class="form-container">
  <h2>Create Note</h2>

  <form #noteForm="ngForm" (ngSubmit)="saveNote()">

    <div class="form-group">
      <label>Title</label>
      <input
        type="text"
        name="title"
        [(ngModel)]="title"
        placeholder="Enter note title"
      />
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea
        name="description"
        rows="6"
        [(ngModel)]="description"
        placeholder="Write your note..."
      ></textarea>
    </div>

    <button type="submit">Save Note</button>

  </form>
</div>
