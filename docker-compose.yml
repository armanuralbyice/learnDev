version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: notes_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5
      start_period: 30s
      
  backend:
    build: ./backend
    container_name: backend
    restart: always
    depends_on:
      db:
        condition: service_healthy 
    ports:
      - "8080:8080" 
    environment:
      DB_HOST: db
      DB_NAME: notes_db
      DB_USER: root
      DB_PASS: root
      
  frontend:
    build: ./frontend
    container_name: frontend
    restart: always

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  db_data:
