spring:
  application:
    name: backend

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:db}:3306/${DB_NAME:notes_db}?allowPublicKeyRetrieval=true&useSSL=false&characterEncoding=UTF-8
    username: ${DB_USER:root}
    password: ${DB_PASS:root}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

logging:
  level:
    org.springframework.web: INFO
    org.hibernate: ERROR

server:
  port: 8080